spring.application.name=first-ai-app
spring.ai.openai.api-key=
# Spring Ai creates the chat memory table automatically on startup
spring.ai.chat.memory.repository.jdbc.initialize-schema=always
spring.ai.chat.memory.repository.jdbc.platform=mysql

#Database configuration
mysql.datasource.url=jdbc:mysql://localhost:3306/aidb
mysql.datasource.username=root
mysql.datasource.password=welcomeMathanki
mysql.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.ai.openai.image.options.model=gpt-image-1
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# ===================================================================
# 2. RUNTIME AND CONTAINER FRAMEWORK ORCHESTRATION
# ===================================================================
spring.docker.compose.enabled=true
spring.main.allow-bean-definition-overriding=true
# Tell Spring what to do if containers are already running when the app starts.
# "none" means: Use the existing running containers and fetch their connection details natively.
spring.docker.compose.lifecycle-management=none

# Force a 5-second failure limit so it crashes with an explicit log instead of hanging
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.initialization-fail-timeout=1

# ===================================================================
# 3. EXPLICIT PRODUCTION REDIS VECTOR PROPERTIES
# ===================================================================
# Explicitly tell Spring Boot to only probe port 6379 for readiness on the redis service
spring.docker.compose.readiness.tcp.redis_vector_db.ports=6379
spring.ai.vectorstore.redis.index-name=course-index
spring.ai.vectorstore.redis.prefix=course:
spring.ai.vectorstore.redis.initialize-schema=true

# Explicitly choose pgvector as the active vector store provider
spring.ai.vectorstore.provider=redis
